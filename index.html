// ─── Tax calculator (Egypt 2025/2026, Andersen Egypt) ────────────────────────
function annualTax(taxable) {
  if (taxable <= 0) return 0;
  const brackets = [
    [0,       40000,   0.00 ],
    [40000,   55000,   0.10 ],
    [55000,   70000,   0.15 ],
    [70000,   200000,  0.20 ],
    [200000,  400000,  0.225],
    [400000,  600000,  0.25 ],
    [600000,  1200000, 0.275],
    [1200000, Infinity,0.275],
  ];
  let tax = 0;
  for (const [from, to, rate] of brackets) {
    if (taxable <= from) break;
    tax += (Math.min(taxable, to) - from) * rate;
  }
  return tax;
}

function calcTakeHome(grossMonthly) {
  const si  = Math.min(grossMonthly, 14500) * 0.11;  // social insurance, capped
  const hi  = grossMonthly * 0.01;                    // health insurance
  const ati = Math.max(0, (grossMonthly - si - hi) * 12 - 20000); // annual taxable
  const mt  = annualTax(ati) / 12;                    // monthly income tax
  return {
    gross: grossMonthly,
    si, hi,
    incomeTax: mt,
    totalDeductions: si + hi + mt,
    net: grossMonthly - si - hi - mt,
  };
}

function calcGrossFromNet(targetNet) {
  let lo = targetNet, hi = targetNet * 2;
  for (let i = 0; i < 50; i++) {
    const mid = (lo + hi) / 2;
    const r = calcTakeHome(mid);
    if (Math.abs(r.net - targetNet) < 1) return r;
    if (r.net < targetNet) lo = mid; else hi = mid;
  }
  return calcTakeHome((lo + hi) / 2);
}

const Chevron = () => (

  </svg>
);

const Pill = ({ children, onClick, variant='outline', style, type='button' }) => {
  const [hov, setHov] = useState(false);
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    padding:'10px 22px', borderRadius:999, fontSize:14, fontWeight:500,
    cursor:'pointer', transition:'all 0.18s ease', border:'none', outline:'none',
    letterSpacing:'0.01em', userSelect:'none', fontFamily:'DM Sans', ...style,
  };
  const on = () => setHov(true), off = () => setHov(false);
  if (variant === 'filled')
    return <button type={type} onClick={onClick} onMouseEnter={on} onMouseLeave={off}
      style={{...base, background: hov ? '#2E8070' : '#3A9D8A', color:'#fff'}}>{children}</button>;
  if (variant === 'ghost')
    return <button type={type} onClick={onClick} onMouseEnter={on} onMouseLeave={off}
      style={{...base, background: hov ? '#EEEAE4' : 'transparent', color:'#1A1916', border:'1.5px solid #D5D0C8'}}>{children}</button>;
  return <button type={type} onClick={onClick} onMouseEnter={on} onMouseLeave={off}
    style={{...base, background: hov ? '#EEEAE4' : 'transparent', color:'#1A1916', border:'1.5px solid #C8C4BC'}}>{children}</button>;
};

// ─── Salary Card ──────────────────────────────────────────────────────────────

// ─── Browse View ──────────────────────────────────────────────────────────────
const BrowseView = () => {
  const [rows, setRows]                 = useState(null); // null = loading
  const [loadError, setLoadError]       = useState('');
  const [roleFilter, setRoleFilter]     = useState('All roles');
  const [indFilter, setIndFilter]       = useState('All industries');
  const [typeFilter, setTypeFilter]     = useState('All company types');
  const [cityFilter, setCityFilter]     = useState('All cities');

  useEffect(() => {
    if (!db) { setRows([]); return; }
    db.from('submissions')
      .select('*')
      .eq('is_visible', true)
      .order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (error) { setLoadError(error.message); setRows([]); }
        else setRows(data || []);
      });
  }, []);

  const roleOptions = useMemo(() => {
    if (!rows || !rows.length) return ['All roles'];
    return ['All roles', ...[...new Set(rows.map(r => r.job_title))].sort()];
  }, [rows]);

  const filtered = (rows || []).filter(r =>
    (roleFilter === 'All roles'          || r.job_title    === roleFilter) &&
    (indFilter  === 'All industries'     || r.industry     === indFilter)  &&
    (typeFilter === 'All company types'  || r.company_type === typeFilter) &&
    (cityFilter === 'All cities'         || r.city         === cityFilter)
  );

  const selStyle = {
    width:'100%', padding:'12px 18px', appearance:'none', WebkitAppearance:'none',
    background:'#fff', border:'1.5px solid #E0DBD4', borderRadius:12,
    fontFamily:'DM Sans', fontSize:14, color:'#1A1916', cursor:'pointer', outline:'none',
  };

  return (
    <div style={{ maxWidth:900, margin:'0 auto', padding:'40px 24px 80px' }}>

      {/* Stats */}
      <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:32, flexWrap:'wrap' }}>
        {rows && rows.length > 0 ? (
          <span style={{ background:'#DFF0ED', color:'#2A7A6B', fontSize:13, fontWeight:500, padding:'5px 14px', borderRadius:999 }}>
            {rows.length} submission{rows.length !== 1 ? 's' : ''}
          </span>
        ) : (
          <span style={{ fontSize:13, fontWeight:500, color:'#6B6660' }}>Be one of the first to contribute</span>
        )}
        <span style={{ fontSize:13, color:'#9B9690' }}>
          <span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#3A9D8A', marginRight:6, verticalAlign:'middle' }}/>
          Fully anonymous · No login required
        </span>
      </div>

      {/* Filters */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10, marginBottom:32 }}>
        {[
          [roleFilter, setRoleFilter, roleOptions],
          [indFilter,  setIndFilter,  INDUSTRIES],
          [typeFilter, setTypeFilter, COMPANY_TYPES],
          [cityFilter, setCityFilter, CITIES_FILTER],
        ].map(([val, set, opts], i) => (
          <div key={i} style={{ position:'relative' }}>
            <select value={val} onChange={e => set(e.target.value)} style={selStyle}>
              {opts.map(o => <option key={o}>{o}</option>)}
            </select>
            <Chevron/>
          </div>
        ))}
      </div>

      {/* Body */}
      {rows === null ? (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4', fontSize:14 }}>Loading…</div>
      ) : loadError ? (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:20, marginBottom:8 }}>Couldn&#39;t load data</div>
          <div style={{ fontSize:13 }}>{loadError}</div>
        </div>
      ) : filtered.length > 0 ? (
        <>
          {filtered.length < rows.length && (
            <div style={{ fontSize:13, color:'#9B9690', marginBottom:20 }}>
              {filtered.length} result{filtered.length !== 1 ? 's' : ''} found
            </div>
          )}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16 }}>
            {filtered.map(r => <SalaryCard key={r.id} entry={r}/>)}
          </div>
        </>
      ) : (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>
            {rows.length === 0 ? 'No submissions yet' : 'No results'}
          </div>
          <div style={{ fontSize:14 }}>
            {rows.length === 0 ? 'Be the first to share your salary.' : 'Try adjusting your filters'}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Submit View ──────────────────────────────────────────────────────────────
const SubmitView = ({ showGate, onBrowse }) => {
  const [form, setForm] = useState({
    title:'', industry:'', industrySub:'', companyType:'', companySize:'',
    experience:'', city:'', currency:'EGP', salaryType:'gross',
    baseMin:'', baseMax:'',
  });
  const [submitted,  setSubmitted]  = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [errors,     setErrors]     = useState({});
  const [apiError,   setApiError]   = useState('');

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v, ...(k === 'industry' ? { industrySub:'' } : {}) }));
    setErrors(er => ({ ...er, [k]: false }));
    setApiError('');
  };

  const validate = () => {
    const e = {};
    if (!form.title.trim()) e.title = true;
    if (!form.industry)     e.industry = true;
    if (!form.companyType)  e.companyType = true;
    if (!form.companySize)  e.companySize = true;
    if (!form.experience)   e.experience = true;
    if (!form.city)         e.city = true;
    if (!form.baseMin)      e.baseMin = true;
    if (!form.baseMax)      e.baseMax = true;
    return e;
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setSubmitting(true);

    if (db) {
      const { error } = await db.from('submissions').insert({
        job_title:        form.title.trim(),
        industry:         form.industry,
        industry_sub:     form.industrySub || null,
        company_type:     form.companyType,
        company_size:     form.companySize,
        years_experience: form.experience,
        city:             form.city,
        salary_min:       parseInt(form.baseMin, 10),
        salary_max:       parseInt(form.baseMax, 10),
        currency:         form.currency,
        salary_type:      form.salaryType,
      });
      if (error) {
        setApiError('Something went wrong. Please try again.');
        setSubmitting(false);
        return;
      }
    }

    localStorage.setItem('cu_has_submitted', 'true');
    setSubmitted(true);
    setSubmitting(false);
  };

  const L = { fontSize:12, fontWeight:500, letterSpacing:'0.06em', color:'#9B9690', display:'block', marginBottom:6 };
  const inp = (err) => ({
    width:'100%', padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
    border: err ? '1.5px solid #E8826A' : '1.5px solid #E0DBD4',
    background:'#fff', color:'#1A1916', outline:'none',
  });

  const Sel = ({ field, options, placeholder, disabled }) => (
    <div style={{ position:'relative' }}>
      <select value={form[field]} onChange={e=>set(field, e.target.value)} disabled={disabled} style={{
        ...inp(errors[field]), appearance:'none', WebkitAppearance:'none',
        cursor: disabled ? 'not-allowed' : 'pointer',
        color: form[field] ? '#1A1916' : '#9B9690', opacity: disabled ? 0.5 : 1,
      }}>
        <option value="">{placeholder}</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <Chevron/>
    </div>
  );

  const subs = INDUSTRY_SUBS[form.industry] || [];

  if (submitted) return (
    <div style={{ maxWidth:520, margin:'80px auto', padding:'0 24px', textAlign:'center' }}>
      <div style={{ width:56, height:56, borderRadius:'50%', background:'#DFF0ED', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 24px' }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M5 13L9 17L19 7" stroke="#3A9D8A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <div style={{ fontFamily:'Playfair Display', fontSize:28, marginBottom:12 }}>Thank you.</div>
      <div style={{ fontSize:15, color:'#6B6660', lineHeight:1.7, marginBottom:36 }}>
        Your submission is anonymous and has been added to the database. Every entry makes the next negotiation a little fairer.
      </div>
      <div style={{ display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap' }}>
        <Pill variant="filled" onClick={onBrowse} style={{ padding:'13px 28px', fontSize:15 }}>Browse the database →</Pill>
        <Pill variant="ghost" onClick={() => setSubmitted(false)}>Submit another</Pill>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth:600, margin:'0 auto', padding:'40px 24px 80px' }}>

      {showGate && (
        <div style={{ background:'#1A1916', color:'#F4F2EF', borderRadius:16, padding:'20px 24px', marginBottom:36, lineHeight:1.7 }}>
          <div style={{ fontWeight:500, marginBottom:6 }}>Browsing requires submitting first.</div>
          <div style={{ fontSize:14, color:'#C8C4BC' }}>
            One submission unlocks unlimited browsing. This keeps the data fed and protects the integrity of the database — only contributors see contributors&#39; data.
          </div>
        </div>
      )}

      <div style={{ marginBottom:32 }}>
        <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>Share your salary</div>
        <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.6 }}>Anonymous · takes under a minute · no account needed</div>
      </div>

      <div style={{ border:'1.5px solid #E0DBD4', borderRadius:12, padding:'14px 16px', fontSize:13, color:'#8A8580', lineHeight:1.65, marginBottom:28 }}>
        <span style={{ fontWeight:500, color:'#6B6660' }}>Honest data only.</span>{' '}
        Submit your current salary or a real offer you received. No estimates, no rumors, no friend-of-a-friend numbers. We&#39;d rather have 200 honest entries than 2,000 noisy ones.
      </div>

      <form onSubmit={handleSubmit} noValidate style={{ display:'flex', flexDirection:'column', gap:22 }}>

        {/* Job title */}
        <div>
          <label style={L}>JOB TITLE</label>
          <input value={form.title} onChange={e=>set('title',e.target.value)}
            placeholder="e.g. Senior Product Manager" style={inp(errors.title)}/>
          {errors.title && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
        </div>

        {/* Industry + sub */}
        <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={L}>INDUSTRY</label>
            <Sel field="industry" options={Object.keys(INDUSTRY_SUBS)} placeholder="Select industry"/>
            {errors.industry && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>
          <div>
            <label style={L}>SUB-CATEGORY</label>
            <Sel field="industrySub" options={subs}
              placeholder={form.industry ? 'Select sub-category' : 'Select industry first'}
              disabled={!form.industry}/>
          </div>
        </div>

        {/* Company type + size */}
        <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={L}>COMPANY TYPE</label>
            <Sel field="companyType" options={["Multinational","Local","Startup"]} placeholder="Select type"/>
            {errors.companyType && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>
          <div>
            <label style={L}>COMPANY SIZE</label>
            <Sel field="companySize" options={COMPANY_SIZES} placeholder="No. of employees"/>
            {errors.companySize && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>
        </div>

        {/* Experience + City */}
        <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
          <div>
            <label style={L}>YEARS OF EXPERIENCE</label>
            <Sel field="experience" options={EXP_RANGES} placeholder="Select range"/>
            {errors.experience && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>
          <div>
            <label style={L}>CITY</label>
            <Sel field="city" options={CITIES_FORM} placeholder="Select city"/>
            {errors.city && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>
        </div>

        {/* Base salary */}
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
            <label style={{...L, marginBottom:0}}>MONTHLY BASE SALARY</label>
            {/* Gross / Net toggle */}
            <div style={{ display:'flex', background:'#ECEAE5', borderRadius:999, padding:3, gap:2 }}>
              {['gross','net'].map(t => (
                <button key={t} type="button" onClick={() => set('salaryType', t)} style={{
                  padding:'4px 12px', borderRadius:999, border:'none', cursor:'pointer',
                  fontFamily:'DM Sans', fontSize:12, fontWeight:500, textTransform:'capitalize',
                  background: form.salaryType === t ? '#fff' : 'transparent',
                  color: form.salaryType === t ? '#1A1916' : '#9B9690',
                  boxShadow: form.salaryType === t ? '0 1px 3px rgba(0,0,0,0.10)' : 'none',
                  transition:'all 0.15s',
                }}>{t}</button>
              ))}
            </div>
          </div>
          <div style={{ fontSize:12, color:'#B0ABA4', marginBottom:10 }}>
            Offers are usually gross. Your take-home is net.
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr auto', gap:10, alignItems:'center' }}>
            <input type="number" value={form.baseMin} onChange={e=>set('baseMin',e.target.value)}

            <span style={{ color:'#9B9690', fontSize:14 }}>—</span>
            <input type="number" value={form.baseMax} onChange={e=>set('baseMax',e.target.value)}

            <div style={{ position:'relative', minWidth:120 }}>

                ...inp(false), minWidth:120, cursor:'pointer', appearance:'none', WebkitAppearance:'none',
              }}>
                <option>EGP</option>
                <option>USD-pegged</option>
              </select>
              <Chevron/>
            </div>
          </div>
          {(errors.baseMin || errors.baseMax) && (
            <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Min and max are required</div>
          )}
        </div>

        {/* Privacy note */}
        <div style={{ background:'#F7F5F2', borderRadius:12, padding:'14px 16px', fontSize:13, color:'#8A8580', lineHeight:1.6 }}>
          Your submission is fully anonymous. We don&#39;t collect your name, email, or IP address. Nothing links this entry back to you.
        </div>

        {/* Pre-submit copy */}
        <p style={{ fontSize:13, color:'#9B9690', lineHeight:1.6 }}>
          Only submit your current net salary or a real offer you received. No estimates, no guesses.
        </p>

        {apiError && (
          <div style={{ fontSize:13, color:'#E8826A', padding:'12px 16px', background:'#FEF4F1', borderRadius:10 }}>

        <Pill type="submit" variant="filled"
          style={{ alignSelf:'flex-start', padding:'13px 32px', fontSize:15, opacity: submitting ? 0.7 : 1 }}>
          {submitting ? 'Submitting…' : 'Submit anonymously'}
        </Pill>
      </form>
    </div>
  );
};

// ─── Calculator View ──────────────────────────────────────────────────────────
const CalculatorView = ({ onGoSubmit }) => {
  const [mode,   setMode]   = useState('gross-to-net');
  const [input,  setInput]  = useState('');
  const [result, setResult] = useState(null);

  const isNtG = mode === 'net-to-gross';

  const handleCalc = (ev) => {
    ev.preventDefault();
    const v = parseFloat(input);
    if (!v || v <= 0) return;
    setResult(isNtG ? calcGrossFromNet(v) : calcTakeHome(v));
  };

  const switchMode = (m) => { setMode(m); setInput(''); setResult(null); };

  const DeductionRow = ({ label, value }) => (
    <div style={{ display:'flex', justifyContent:'space-between', padding:'9px 0', borderBottom:'1px solid #F2EFE9', fontSize:14, color:'#6B6660' }}>
      <span>{label}</span>
      <span style={{ fontVariantNumeric:'tabular-nums' }}>− {fmt(value)} EGP</span>
    </div>
  );

  return (
    <div style={{ maxWidth:520, margin:'0 auto', padding:'40px 24px 80px' }}>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>Take-home calculator</div>
        <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.6 }}>
          Egypt 2025/2026 · Official tax brackets · No account needed
        </div>
      </div>

      {/* Mode toggle */}
      <div style={{ display:'inline-flex', background:'#EEEAE4', borderRadius:999, padding:4, marginBottom:24 }}>
        {[['gross-to-net', 'Gross → Net'], ['net-to-gross', 'Net → Gross']].map(([key, label]) => (
          <button key={key} type="button" onClick={() => switchMode(key)} style={{
            padding:'8px 18px', borderRadius:999, fontSize:13, fontWeight:500,
            border:'none', cursor:'pointer', transition:'all 0.18s ease', fontFamily:'DM Sans',
            background: mode === key ? '#fff' : 'transparent',
            color:      mode === key ? '#1A1916' : '#6B6660',
            boxShadow:  mode === key ? '0 1px 3px rgba(0,0,0,0.10)' : 'none',
          }}>{label}</button>
        ))}
      </div>

      {isNtG && (
        <div style={{ fontSize:13, color:'#6B6660', lineHeight:1.6, marginBottom:20, background:'#F7F5F2', borderRadius:12, padding:'12px 16px' }}>
          Know what gross to negotiate for — enter your target take-home and see the gross you need to ask for.
        </div>
      )}

      <form onSubmit={handleCalc}>
        <label style={{ fontSize:12, fontWeight:500, letterSpacing:'0.06em', color:'#9B9690', display:'block', marginBottom:6 }}>
          {isNtG ? 'TARGET MONTHLY NET (EGP)' : 'MONTHLY GROSS SALARY (EGP)'}
        </label>
        <div style={{ display:'flex', gap:10, marginBottom: result ? 32 : 0 }}>
          <input
            type="number" value={input}
            onChange={e => { setInput(e.target.value); setResult(null); }}
            placeholder={isNtG ? 'e.g. 25,000' : 'e.g. 30,000'}
            style={{
              flex:1, padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
              border:'1.5px solid #E0DBD4', background:'#fff', color:'#1A1916', outline:'none',
            }}
          />
          <Pill type="submit" variant="filled" style={{ padding:'13px 24px', flexShrink:0 }}>
            Calculate
          </Pill>
        </div>
      </form>

      {result && (
        <>
          {/* Breakdown card */}
          <div style={{ background:'#fff', borderRadius:20, padding:'24px', border:'1.5px solid #E8E4DE', marginBottom:12 }}>
            {/* Header row */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingBottom:14, marginBottom:4, borderBottom:'1.5px solid #EEEAE4' }}>
              <span style={{ fontSize:14, fontWeight:500 }}>{isNtG ? 'Required gross' : 'Gross salary'}</span>
              <span style={{ fontFamily:'Playfair Display', fontSize:isNtG ? 28 : 20, fontWeight:500, letterSpacing:'-0.02em', color: isNtG ? '#3A9D8A' : 'inherit' }}>
                {fmt(result.gross)} EGP
              </span>
            </div>

            {/* Deductions */}
            <DeductionRow label="Social insurance (11%, cap 14,500 EGP)" value={result.si}/>
            <DeductionRow label="Health insurance (1%)"                   value={result.hi}/>
            <DeductionRow label="Income tax"                               value={result.incomeTax}/>

            {/* Footer row */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingTop:16, marginTop:2 }}>
              <span style={{ fontSize:16, fontWeight:500 }}>Net take-home</span>
              <span style={{ fontFamily:'Playfair Display', fontSize: isNtG ? 20 : 28, fontWeight:500, color: isNtG ? '#1A1916' : '#3A9D8A', letterSpacing:'-0.02em' }}>
                {fmt(result.net)} EGP

          </div>

// ─── Utility Shell ────────────────────────────────────────────────────────────
const UtilityShell = ({ onGoHome, initialTab, initialGate }) => {
  const [activeTab, setActiveTab] = useState(initialTab || 'submit');
  const [gated,     setGated]     = useState(initialGate || false);

  const hasSubmitted = () => localStorage.getItem('cu_has_submitted') === 'true';

  const switchTab = (key) => {
    if (key === 'calculate') {
      setActiveTab('calculate'); setGated(false); return;
    }
    if (key === 'browse' && !hasSubmitted()) {
      setActiveTab('submit'); setGated(true);
    } else {
      setActiveTab(key); setGated(false);
    }
  };

  const onBrowseUnlocked = () => { setActiveTab('browse'); setGated(false); window.scrollTo(0,0); };
  const onGoSubmit       = () => { setActiveTab('submit'); setGated(false); window.scrollTo(0,0); };

  const TABS = [
    ['browse',    'Browse salaries'],
    ['submit',    'Submit yours'],
    ['calculate', 'Calculate'],
  ];

  return (
    <div style={{ minHeight:'100vh', background:'#F4F2EF' }}>
      <nav style={{
        position:'sticky', top:0, zIndex:100,
        background:'rgba(244,242,239,0.92)', backdropFilter:'blur(12px)',
        borderBottom:'1px solid #E8E4DE',
        padding:'0 32px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        height:64,
      }}>
        <Logo onClick={onGoHome}/>
        <div style={{ display:'flex', alignItems:'center', gap:2, background:'#ECEAE5', borderRadius:999, padding:4 }}>
          {TABS.map(([key, label]) => (
            <button key={key} onClick={() => switchTab(key)} style={{
              padding:'8px 18px', borderRadius:999, border:'none', cursor:'pointer',
              fontFamily:'DM Sans', fontSize:13, fontWeight:500, transition:'all 0.18s ease',
              background: activeTab === key ? '#fff' : 'transparent',
              color: activeTab === key ? '#1A1916' : '#8A8580',
              boxShadow: activeTab === key ? '0 1px 4px rgba(0,0,0,0.10)' : 'none',
            }}>{label}</button>
          ))}
        </div>
        <div style={{ width:120 }}/>
      </nav>

      {activeTab === 'browse'    && <BrowseView/>}
      {activeTab === 'submit'    && <SubmitView showGate={gated} onBrowse={onBrowseUnlocked}/>}
      {activeTab === 'calculate' && <CalculatorView onGoSubmit={onGoSubmit}/>}
    </div>
  );
};

      {/* Footer */}
      <footer style={{ padding:'32px 48px', display:'flex', justifyContent:'space-between', alignItems:'center', borderTop:'1px solid #E8E4DE', flexWrap:'wrap', gap:12 }}>
        <Logo/>
        <div style={{ fontSize:13, color:'#B0ABA4' }}>Built for Egyptian professionals. Always anonymous.</div>
      </footer>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [view,     setView]     = useState('landing');
  const [tab,      setTab]      = useState('submit');
  const [showGate, setShowGate] = useState(false);

  const goToUtility = (t) => {
    if (t === 'calculate') {
      setTab('calculate'); setShowGate(false); setView('utility');
      window.scrollTo(0, 0); return;
    }
    const sub = localStorage.getItem('cu_has_submitted') === 'true';
    const dest = (t === 'browse' && !sub) ? 'submit' : t;
    setTab(dest);
    setShowGate(t === 'browse' && !sub);
    setView('utility');
    window.scrollTo(0, 0);
  };

  const goHome = () => { setView('landing'); window.scrollTo(0, 0); };

  if (view === 'landing') return <LandingPage onEnter={goToUtility}/>;
  return <UtilityShell onGoHome={goHome} initialTab={tab} initialGate={showGate}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
