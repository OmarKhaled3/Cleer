// ─── Tax calculator (Egypt 2025/2026, Andersen Egypt) ────────────────────────
function annualTax(taxable) {
  if (taxable <= 0) return 0;
  const brackets = [
    [0,       40000,   0.00 ],
    [40000,   55000,   0.10 ],
    [55000,   70000,   0.15 ],
    [70000,   200000,  0.20 ],
    [200000,  400000,  0.225],
    [400000,  600000,  0.25 ],
    [600000,  1200000, 0.275],
    [1200000, Infinity,0.275],
  ];
  let tax = 0;
  for (const [from, to, rate] of brackets) {
    if (taxable <= from) break;
    tax += (Math.min(taxable, to) - from) * rate;
  }
  return tax;
}

function calcTakeHome(grossMonthly) {
  const si  = Math.min(grossMonthly, 14500) * 0.11;  // social insurance, capped
  const hi  = grossMonthly * 0.01;                    // health insurance
  const ati = Math.max(0, (grossMonthly - si - hi) * 12 - 20000); // annual taxable
  const mt  = annualTax(ati) / 12;                    // monthly income tax
  return {
    gross: grossMonthly,
    si, hi,
    incomeTax: mt,
    totalDeductions: si + hi + mt,
    net: grossMonthly - si - hi - mt,
  };
}

function calcGrossFromNet(targetNet) {
  let lo = targetNet, hi = targetNet * 2;
  for (let i = 0; i < 50; i++) {
    const mid = (lo + hi) / 2;
    const r = calcTakeHome(mid);
    if (Math.abs(r.net - targetNet) < 1) return r;
    if (r.net < targetNet) lo = mid; else hi = mid;
  }
  return calcTakeHome((lo + hi) / 2);
}

const BrowseView = ({ onTitleClick }) => {
  const [rows, setRows]                 = useState(null); // null = loading

  const [roleFilter, setRoleFilter]     = useState('All roles');
  const [indFilter, setIndFilter]       = useState('All industries');
  const [typeFilter, setTypeFilter]     = useState('All company types');
  const [cityFilter, setCityFilter]     = useState('All cities');

  useEffect(() => {
    if (!db) { setRows([]); return; }
    db.from('submissions')
      .select('*')
      .or('is_visible.eq.true,is_seeded.eq.true')
      .order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (error) { setLoadError(error.message); setRows([]); }
        else setRows(data || []);
      });
  }, []);

  const roleOptions = useMemo(() => {
    if (!rows || !rows.length) return ['All roles'];
    return ['All roles', ...[...new Set(rows.map(r => r.job_title))].sort()];
  }, [rows]);

  const filtered = (rows || []).filter(r =>
    (roleFilter === 'All roles'          || r.job_title    === roleFilter) &&
    (indFilter  === 'All industries'     || r.industry     === indFilter)  &&
    (typeFilter === 'All company types'  || r.company_type === typeFilter) &&
    (cityFilter === 'All cities'         || r.city         === cityFilter)
  );

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(r => {
      const key = [r.job_title, r.industry, r.years_experience, r.city, r.compensation_type || ''].join('\x00');
      if (!map[key]) {
        map[key] = { ...r, count: 1 };

        map[key].salary_min = Math.min(map[key].salary_min, r.salary_min);
        map[key].salary_max = Math.max(map[key].salary_max, r.salary_max);
        map[key].count += 1;
        if (r.created_at > map[key].created_at) map[key].created_at = r.created_at;

    });
    return Object.values(map);
  }, [filtered]);

  const selStyle = {
    width:'100%', padding:'12px 18px', appearance:'none', WebkitAppearance:'none',
    background:'#fff', border:'1.5px solid #E0DBD4', borderRadius:12,
    fontFamily:'DM Sans', fontSize:14, color:'#1A1916', cursor:'pointer', outline:'none',
  };

  return (
    <div style={{ maxWidth:900, margin:'0 auto', padding:'40px 24px 80px' }}>

      {/* Stats */}
      <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:32, flexWrap:'wrap' }}>
        {rows && rows.length > 0 ? (
          <span style={{ background:'#DFF0ED', color:'#2A7A6B', fontSize:13, fontWeight:500, padding:'5px 14px', borderRadius:999 }}>
            {rows.length} submission{rows.length !== 1 ? 's' : ''}
          </span>
        ) : (
          <span style={{ fontSize:13, fontWeight:500, color:'#6B6660' }}>Be one of the first to contribute</span>
        )}
        <span style={{ fontSize:13, color:'#9B9690' }}>
          <span style={{ display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#3A9D8A', marginRight:6, verticalAlign:'middle' }}/>
          Fully anonymous · No login required
        </span>
      </div>

      {/* Filters */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:10, marginBottom:32 }}>
        {[
          [roleFilter, setRoleFilter, roleOptions],
          [indFilter,  setIndFilter,  INDUSTRIES],
          [typeFilter, setTypeFilter, COMPANY_TYPES],
          [cityFilter, setCityFilter, CITIES_FILTER],
        ].map(([val, set, opts], i) => (
          <div key={i} style={{ position:'relative' }}>
            <select value={val} onChange={e => set(e.target.value)} style={selStyle}>
              {opts.map(o => <option key={o}>{o}</option>)}
            </select>
            <Chevron/>

        ))}

      {/* Body */}
      {rows === null ? (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4', fontSize:14 }}>Loading…</div>
      ) : loadError ? (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:20, marginBottom:8 }}>Couldn&#39;t load data</div>
          <div style={{ fontSize:13 }}>{loadError}</div>
        </div>
      ) : grouped.length > 0 ? (
        <>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16 }}>
            {grouped.map((g, i) => <SalaryCard key={i} entry={g} onClick={onTitleClick ? () => onTitleClick({ job_title: g.job_title, industry: g.industry }) : undefined}/>)}
          </div>
        </>
      ) : (
        <div style={{ textAlign:'center', padding:'80px 0', color:'#B0ABA4' }}>
          <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>
            {rows.length === 0 ? 'No submissions yet' : 'No results'}
          </div>
          <div style={{ fontSize:14 }}>
            {rows.length === 0 ? 'Be the first to share your salary.' : 'Try adjusting your filters'}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Distribution Bar ─────────────────────────────────────────────────────────
const DistributionBar = ({ scaleMin, scaleMax, lowRange, typical, highRange, userValue, height = 10 }) => {
  const range = scaleMax - scaleMin;
  if (range <= 0) return null;
  const pct  = v => `${Math.max(0, Math.min(100, ((v - scaleMin) / range) * 100))}%`;
  const wPct = (a, b) => `${Math.max(0, Math.min(100, ((b - a) / range) * 100))}%`;
  return (
    <div style={{ position:'relative', height, background:'#E8E4DE', borderRadius:999 }}>
      <div style={{
        position:'absolute', top:0, bottom:0,
        left: pct(lowRange), width: wPct(lowRange, highRange),
        background:'#3A9D8A', borderRadius:999,
      }}/>
      <div style={{
        position:'absolute', top:-3, bottom:-3,
        left: pct(typical), transform:'translateX(-50%)',
        width:3, background:'#1A1916', borderRadius:2,
      }}/>
      {userValue != null && (
        <div style={{
          position:'absolute', top:-5, bottom:-5,
          left: pct(userValue), transform:'translateX(-50%)',
          width:3, background:'#E8826A', borderRadius:2, zIndex:2,
        }}/>
      )}
    </div>
  );
};

  const stats = useMemo(() => {
    if (!rows || rows.length === 0) return null;
    const mids = rows.map(r => {
      const mid = (r.salary_min + r.salary_max) / 2;
      return r.salary_type === 'gross' ? calcTakeHome(mid).net : mid;
    }).sort((a, b) => a - b);
    const n   = mids.length;
    const at  = p => mids[Math.min(n - 1, Math.floor(n * p))];
    const newest = rows.reduce((a, b) => a.created_at > b.created_at ? a : b);
    return {
      typical:     at(0.5),
      lowRange:    at(0.25),
      highRange:   at(0.75),
      min:         mids[0],
      max:         mids[n - 1],
      count:       n,
      lastUpdated: newest.created_at,
    };
  }, [rows]);

  const breakdowns = useMemo(() => {
    if (!rows) return { city:[], companyType:[], experience:[] };
    const build = keyFn => {
      const groups = {};
      rows.forEach(r => {
        const key = keyFn(r);
        if (!key) return;
        if (!groups[key]) groups[key] = [];
        const mid = (r.salary_min + r.salary_max) / 2;
        groups[key].push(r.salary_type === 'gross' ? calcTakeHome(mid).net : mid);
      });
      return Object.entries(groups)
        .filter(([, vals]) => vals.length >= 5)
        .map(([label, vals]) => {
          vals.sort((a, b) => a - b);
          const n  = vals.length;
          const at = p => vals[Math.min(n - 1, Math.floor(n * p))];
          return { label, count: n, typical: at(0.5), lowRange: at(0.25), highRange: at(0.75) };
        })
        .sort((a, b) => b.count - a.count);
    };
    return {
      city:        build(r => r.city),
      companyType: build(r => r.company_type),
      experience:  build(r => r.years_experience),
    };
  }, [rows]);

  const availableTabs = useMemo(() => {
    const t = [];
    if (breakdowns.city.length        >= 2) t.push({ key:'city',        label:'By City'        });
    if (breakdowns.companyType.length >= 2) t.push({ key:'companyType', label:'By Company Type' });
    if (breakdowns.experience.length  >= 2) t.push({ key:'experience',  label:'By Experience'   });
    return t;
  }, [breakdowns]);

  useEffect(() => {
    if (availableTabs.length > 0 && activeTab === null) setActiveTab(availableTabs[0].key);
  }, [availableTabs, activeTab]);

  const activeSegs = activeTab ? (breakdowns[activeTab] || []) : [];
  const tabScale   = activeSegs.length ? {
    min: Math.min(...activeSegs.map(s => s.lowRange))  * 0.85,
    max: Math.max(...activeSegs.map(s => s.highRange)) * 1.15,
  } : null;

  const userNet    = parseFloat(userSalary) || 0;
  const userResult = (userNet > 0 && stats) ? (() => {
    let label;
    if      (userNet < stats.lowRange)    label = 'below the typical range';
    else if (userNet < stats.typical)     label = 'in the lower half for this role';
    else if (userNet <= stats.highRange)  label = 'in the upper half for this role';
    else                                  label = 'among the top earners for this role';
    return { net: userNet, typNet: stats.typical, label };
  })() : null;

  const barScaleMin = stats ? stats.min * 0.85 : 0;
  const barScaleMax = stats ? stats.max * 1.15 : 1;

  const fmtDate = ts => {
    const d = daysAgo(ts);
    if (d === 0) return 'today';
    if (d < 30)  return `${d}d ago`;
    return new Date(ts).toLocaleDateString('en-US', { month:'short', year:'numeric' });
  };

  const card = {
    background:'#fff', borderRadius:20, padding:'28px 32px',
    border:'1.5px solid #E8E4DE', boxShadow:'0 2px 12px rgba(0,0,0,0.04)',
    marginBottom:16,
  };

  if (rows === null) return (
    <div style={{ maxWidth:720, margin:'0 auto', padding:'40px 24px 80px', textAlign:'center', color:'#B0ABA4', fontSize:14 }}>
      Loading…
    </div>
  );

  return (
    <div style={{ maxWidth:720, margin:'0 auto', padding:'40px 24px 80px' }}>

      {/* ── Breadcrumb ── */}
      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:28, fontSize:13, color:'#9B9690', flexWrap:'wrap' }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'DM Sans', fontSize:13, color:'#9B9690', padding:0, transition:'color 0.15s' }}
          onMouseEnter={e => e.currentTarget.style.color='#3A9D8A'}
          onMouseLeave={e => e.currentTarget.style.color='#9B9690'}>
          Browse
        </button>
        <span>›</span>
        <span>{industry}</span>
        <span>›</span>
        <span style={{ color:'#1A1916' }}>{job_title}</span>
      </div>

      {/* ── Hero ── */}
      <div style={{ marginBottom:40 }}>
        <h1 style={{ fontFamily:'Playfair Display', fontSize:'clamp(28px, 5vw, 44px)', fontWeight:500, letterSpacing:'-0.02em', lineHeight:1.15, marginBottom:20 }}>
          {job_title}
        </h1>
        {stats && (
          <div style={{ display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
            <span style={{ background:'#DFF0ED', color:'#2A7A6B', fontSize:13, fontWeight:500, padding:'5px 14px', borderRadius:999 }}>
              Typical {fmt(stats.typical)} EGP/mo
            </span>
            <span style={{ color:'#D5D0C8' }}>·</span>
            <span style={{ fontSize:13, color:'#6B6660' }}>{fmt(stats.min)}–{fmt(stats.max)} EGP range</span>
            <span style={{ color:'#D5D0C8' }}>·</span>
            <span style={{ fontSize:13, color:'#6B6660' }}>{stats.count} {stats.count === 1 ? 'salary' : 'salaries'}</span>
            <span style={{ color:'#D5D0C8' }}>·</span>
            <span style={{ fontSize:13, color:'#B0ABA4' }}>Updated {fmtDate(stats.lastUpdated)}</span>
          </div>
        )}
      </div>

      {/* ── Where do you stand? ── */}
      {stats && (
        <div style={card}>
          <div style={{ fontSize:12, fontWeight:500, letterSpacing:'0.10em', color:'#9B9690', textTransform:'uppercase', marginBottom:16 }}>
            Where do you stand?
          </div>

          <div style={{ marginBottom:24 }}>
            {showSalaryPrompt ? (
              <div>
                <div style={{ fontSize:13, color:'#6B6660', marginBottom:10, lineHeight:1.6 }}>
                  What's your net monthly salary?
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <input
                    type="number"
                    value={promptSalary}
                    onChange={e => setPromptSalary(e.target.value)}
                    placeholder="e.g. 18000"
                    style={{
                      flex:1, padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
                      border:'1.5px solid #E0DBD4', background:'#F7F5F2', color:'#1A1916', outline:'none',
                    }}
                  />
                  <button
                    type="button"
                    onClick={() => {
                      const net = parseFloat(promptSalary);
                      if (!net || net <= 0) return;
                      localStorage.setItem('cu_salary', String(Math.round(net)));
                      setUserSalary(String(Math.round(net)));
                      setShowSalaryPrompt(false);
                    }}
                    style={{
                      padding:'13px 20px', borderRadius:12, border:'none',
                      background:'#3A9D8A', color:'#fff', fontFamily:'DM Sans',
                      fontSize:14, fontWeight:500, cursor:'pointer', whiteSpace:'nowrap',
                    }}
                  >Confirm</button>
                </div>
              </div>
            ) : (
              <input
                type="number"
                value={userSalary}
                onChange={e => setUserSalary(e.target.value)}
                placeholder="Your net monthly salary (EGP)"
                style={{
                  width:'100%', padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
                  border:'1.5px solid #E0DBD4', background:'#F7F5F2', color:'#1A1916', outline:'none',
                }}
              />
            )}
          </div>

          <div style={{ marginBottom:8 }}>
            <DistributionBar
              scaleMin={barScaleMin} scaleMax={barScaleMax}
              lowRange={stats.lowRange} typical={stats.typical} highRange={stats.highRange}
              userValue={userNet > 0 ? userNet : null}
              height={12}
            />
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:8, fontSize:11, color:'#9B9690' }}>
              <span>Low range · {fmt(stats.lowRange)}</span>
              <span>Typical · {fmt(stats.typical)}</span>
              <span>High range · {fmt(stats.highRange)}</span>
            </div>
          </div>

          <div style={{ fontSize:12, color:'#B0ABA4', lineHeight:1.65, marginTop:14, marginBottom: userResult ? 20 : 0 }}>
            The teal band shows the common earning range. The dark line is the middle — half of reported salaries are above it, half are below.
          </div>

          {userResult && (
            <div style={{ borderTop:'1px solid #E8E4DE', paddingTop:20, marginTop:4 }}>
              <div style={{ fontSize:15, fontWeight:500, marginBottom:20 }}>
                You're <span style={{ color:'#3A9D8A' }}>{userResult.label}</span>
              </div>
              <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <div style={{ background:'#F7F5F2', borderRadius:14, padding:'16px 18px' }}>
                  <div style={{ fontSize:11, fontWeight:500, letterSpacing:'0.08em', color:'#9B9690', textTransform:'uppercase', marginBottom:6 }}>Your take-home</div>
                  <div style={{ fontFamily:'Playfair Display', fontSize:22, fontWeight:500, letterSpacing:'-0.02em' }}>
                    {fmt(userResult.net)} <span style={{ fontSize:13, fontWeight:400, color:'#9B9690' }}>EGP</span>
                  </div>
                  <div style={{ fontSize:12, color:'#B0ABA4', marginTop:4 }}>net / month</div>
                </div>
                <div style={{ background:'#F7F5F2', borderRadius:14, padding:'16px 18px' }}>
                  <div style={{ fontSize:11, fontWeight:500, letterSpacing:'0.08em', color:'#9B9690', textTransform:'uppercase', marginBottom:6 }}>Typical take-home</div>
                  <div style={{ fontFamily:'Playfair Display', fontSize:22, fontWeight:500, letterSpacing:'-0.02em', color:'#3A9D8A' }}>
                    {fmt(userResult.typNet)} <span style={{ fontSize:13, fontWeight:400, color:'#9B9690' }}>EGP</span>
                  </div>
                  <div style={{ fontSize:12, color:'#B0ABA4', marginTop:4 }}>net / month</div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── Breakdown ── */}
      {availableTabs.length > 0 && (
        <div style={card}>
          <div style={{ fontSize:12, fontWeight:500, letterSpacing:'0.10em', color:'#9B9690', textTransform:'uppercase', marginBottom:20 }}>
            Breakdown
          </div>

          <div style={{ display:'flex', gap:4, marginBottom:28, background:'#F4F2EF', borderRadius:999, padding:4, width:'fit-content' }}>
            {availableTabs.map(t => (
              <button key={t.key} onClick={() => setActiveTab(t.key)} style={{
                padding:'7px 16px', borderRadius:999, border:'none', cursor:'pointer',
                fontFamily:'DM Sans', fontSize:13, fontWeight:500, transition:'all 0.18s ease',
                background: activeTab === t.key ? '#fff' : 'transparent',
                color:      activeTab === t.key ? '#1A1916' : '#8A8580',
                boxShadow:  activeTab === t.key ? '0 1px 4px rgba(0,0,0,0.10)' : 'none',
              }}>
                {t.label}
              </button>
            ))}
          </div>

          {tabScale && activeSegs.map((seg, i) => (
            <div key={seg.label} style={{ marginBottom: i < activeSegs.length - 1 ? 28 : 0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
                <span style={{ fontSize:14, fontWeight:500 }}>{seg.label}</span>
                <div style={{ display:'flex', gap:10, alignItems:'baseline' }}>
                  <span style={{ fontFamily:'Playfair Display', fontSize:16, color:'#3A9D8A', letterSpacing:'-0.01em' }}>
                    {fmt(seg.typical)} EGP
                  </span>
                  <span style={{ fontSize:11, color:'#9B9690' }}>{seg.count} salaries</span>
                </div>
              </div>
              <DistributionBar
                scaleMin={tabScale.min} scaleMax={tabScale.max}
                lowRange={seg.lowRange} typical={seg.typical} highRange={seg.highRange}
                height={8}
              />
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:6, fontSize:11, color:'#B0ABA4' }}>
                <span>{fmt(seg.lowRange)}</span>
                <span style={{ fontWeight:500, color:'#9B9690' }}>typical</span>
                <span>{fmt(seg.highRange)}</span>
              </div>
            </div>
          ))}

          <div style={{ borderTop:'1px solid #E8E4DE', marginTop:24, paddingTop:14, fontSize:12, color:'#B0ABA4' }}>
            Only segments with 5+ submissions are shown.
          </div>
        </div>
      )}

      {/* ── Your salary vs. this role ── */}
      {userResult && (
        <div style={{ background:'#F7F5F2', borderRadius:20, padding:'28px 32px', border:'1.5px solid #E8E4DE', marginBottom:16 }}>
          <div style={{ fontSize:11, fontWeight:500, letterSpacing:'0.10em', color:'#9B9690', textTransform:'uppercase', marginBottom:20 }}>
            Your salary vs. this role
          </div>
          <div style={{ marginBottom:20 }}>
            <DistributionBar
              scaleMin={barScaleMin} scaleMax={barScaleMax}
              lowRange={stats.lowRange} typical={stats.typical} highRange={stats.highRange}
              userValue={userNet}
              height={10}
            />
          </div>
          {(() => {
            const pct   = Math.round(Math.abs(userNet - stats.typical) / stats.typical * 100);
            const above = userNet >= stats.typical;
            return (
              <>
                <div style={{ fontFamily:'Playfair Display', fontSize:19, fontWeight:500, letterSpacing:'-0.01em', marginBottom:10, color: above ? '#3A9D8A' : '#1A1916' }}>
                  {above ? '▲' : '▼'} {pct}% {above ? 'above' : 'below'} the typical for this role
                </div>
                <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.7 }}>
                  {above
                    ? `Your salary is above what most people in this role report — useful context if you're considering a move.`
                    : `The typical here is ${fmt(Math.round(stats.typical - userNet))} EGP/mo more — useful context if you're considering a move.`
                  }
                </div>
              </>
            );
          })()}
        </div>
      )}

      {/* ── Trust signal ── */}
      <div style={{ textAlign:'center', fontSize:12, color:'#B0ABA4', lineHeight:1.8 }}>
        No name · No email · No company · Anonymous by design, not just policy.
      </div>

    </div>
  );
};

// ─── Copy Link Button ─────────────────────────────────────────────────────────
const CopyBtn = () => {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={copy} style={{
      display:'inline-flex', alignItems:'center', gap:8,
      padding:'10px 22px', borderRadius:999, border:'1.5px solid #D5D0C8',
      background: copied ? '#DFF0ED' : 'transparent', cursor:'pointer',
      fontFamily:'DM Sans', fontSize:13, fontWeight:500,
      color: copied ? '#3A9D8A' : '#1A1916', transition:'all 0.18s',
    }}>
      {copied ? '✓ Copied!' : 'Copy link'}
    </button>
  );
};

// ─── Submit View ──────────────────────────────────────────────────────────────
const SubmitView = ({ showGate, onBrowse, onGoCalculate }) => {
  const [form, setForm] = useState({
    title:'', industry:'', industrySub:'', companyType:'', companySize:'',
    experience:'', city:'', currency:'EGP', salaryType:'net',
    base:'', compensationType:'Base salary only',
  });
  const [step,       setStep]       = useState(1);
  const [submitted,  setSubmitted]  = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [errors,     setErrors]     = useState({});
  const [apiError,   setApiError]   = useState('');
  const [benchmark,  setBenchmark]  = useState(null);

  const set = (k, v) => {
    setForm(f => ({ ...f, [k]: v, ...(k === 'industry' ? { industrySub:'' } : {}) }));
    setErrors(er => ({ ...er, [k]: false }));
    setApiError('');
  };

  const validateStep = (s) => {
    const e = {};
    if (s === 1) {
      if (!form.title.trim()) e.title = true;
      if (!form.industry)     e.industry = true;
    } else if (s === 2) {
      if (!form.experience)   e.experience = true;
    } else {
      if (!form.companyType)  e.companyType = true;
      if (!form.companySize)  e.companySize = true;
      if (!form.city)         e.city = true;
      if (!form.base)         e.base = true;
    }
    return e;
  };

  const handleNext = () => {
    const errs = validateStep(step);
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setErrors({});
    setStep(s => s + 1);
    window.scrollTo(0, 0);
  };

  const handleBack = () => { setStep(s => s - 1); setErrors({}); window.scrollTo(0, 0); };

  const fetchBenchmark = async (title, city, industry, experience, base, salaryType) => {
    const userVal = parseInt(base);
    const userNet = salaryType === 'gross' ? calcTakeHome(userVal).net : userVal;
    if (!db) { setBenchmark({ count: 0 }); return; }
    const { data } = await db
      .from('submissions')
      .select('salary_min, salary_max')
      .or('is_visible.eq.true,is_seeded.eq.true')
      .ilike('job_title', title.trim())
      .eq('industry', industry)
      .eq('years_experience', experience)
      .eq('city', city);
    const peers = (data || []).map(r => (r.salary_min + r.salary_max) / 2);
    const n = peers.length;
    if (n === 0) { setBenchmark({ count: 0 }); return; }
    const marketMid = peers.reduce((a, b) => a + b, 0) / n;
    const pct   = Math.round(Math.abs(userNet - marketMid) / marketMid * 100);
    const above = userNet >= marketMid;
    setBenchmark({ count: n, pct, above, marketMid: Math.round(marketMid) });
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    const errs = validateStep(3);
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setSubmitting(true);

    if (db) {
      const { error } = await db.from('submissions').insert({
        job_title:        form.title.trim(),
        industry:         form.industry,
        industry_sub:     form.industrySub || null,
        company_type:     form.companyType,
        company_size:     form.companySize,
        years_experience: form.experience,
        city:             form.city,
        salary_min:        parseInt(form.base, 10),
        salary_max:        parseInt(form.base, 10),
        currency:          form.currency,
        salary_type:       form.salaryType,
        compensation_type: form.compensationType,
      });
      if (error) {
        setApiError('Something went wrong. Please try again.');
        setSubmitting(false);
        return;
      }
    }

    localStorage.setItem('cu_has_submitted', 'true');
    const salVal = parseInt(form.base, 10);
    localStorage.setItem('cu_salary', String(Math.round(
      form.salaryType === 'net' ? salVal : calcTakeHome(salVal).net
    )));
    setSubmitted(true);
    setSubmitting(false);
    fetchBenchmark(form.title, form.city, form.industry, form.experience, form.base, form.salaryType);
  };

  const L   = { fontSize:12, fontWeight:500, letterSpacing:'0.06em', color:'#9B9690', display:'block', marginBottom:6 };
  const inp = (err) => ({
    width:'100%', padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
    border: err ? '1.5px solid #E8826A' : '1.5px solid #E0DBD4',
    background:'#fff', color:'#1A1916', outline:'none',
  });

  const Sel = ({ field, options, placeholder, disabled }) => (
    <div style={{ position:'relative' }}>
      <select value={form[field]} onChange={e=>set(field, e.target.value)} disabled={disabled} style={{
        ...inp(errors[field]), appearance:'none', WebkitAppearance:'none',
        cursor: disabled ? 'not-allowed' : 'pointer',
        color: form[field] ? '#1A1916' : '#9B9690', opacity: disabled ? 0.5 : 1,
      }}>
        <option value="">{placeholder}</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <Chevron/>
    </div>
  );

  const subs = INDUSTRY_SUBS[form.industry] || [];

  const BackBtn = () => (
    <button type="button" onClick={handleBack} style={{
      background:'none', border:'none', cursor:'pointer', fontFamily:'DM Sans',
      fontSize:14, color:'#9B9690', padding:'13px 0', lineHeight:1,
    }}>← Back</button>
  );

  const stepSubtitle = ['Your role and industry.', 'Your experience level.', 'Last step — your salary details.'][step - 1];

  if (submitted) {
    const bm      = benchmark;
    const hasData = bm && bm.count > 0;
    const isFirst = bm && bm.count === 0;
    return (
      <div style={{ maxWidth:520, margin:'60px auto', padding:'0 24px 80px' }}>

        {/* Header */}
        <div style={{ textAlign:'center', marginBottom:36 }}>
          <div style={{ width:48, height:48, borderRadius:'50%', background:'#DFF0ED', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px' }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M5 13L9 17L19 7" stroke="#3A9D8A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div style={{ fontFamily:'Playfair Display', fontSize:26, marginBottom:10 }}>Submitted. Thank you.</div>
          <div style={{ fontSize:15, color:'#6B6660', lineHeight:1.7 }}>Every entry makes the next negotiation fairer.</div>
        </div>

        {/* Loading */}
        {!bm && (
          <div style={{ textAlign:'center', padding:'16px 0', fontSize:13, color:'#B0ABA4' }}>
            Computing your benchmark…
          </div>
        )}

        {/* No peers in group yet */}
        {isFirst && (
          <div style={{ textAlign:'center', padding:'12px 0 32px' }}>
            <div style={{ fontSize:15, color:'#6B6660', lineHeight:1.7 }}>
              You're the first to share for this role — check back as more data comes in.
            </div>
          </div>
        )}

        {/* Group market comparison */}
        {hasData && (<>

          {/* Benchmark card — light, consistent with browse cards */}
          <div style={{
            background:'#fff', borderRadius:20, padding:'24px 28px',
            border:'1.5px solid #E8E4DE', marginBottom:28, textAlign:'center',
          }}>
            <div style={{ fontSize:11, fontWeight:500, letterSpacing:'0.08em', color:'#9B9690', textTransform:'uppercase', marginBottom:16 }}>
              Market comparison
            </div>
            <div style={{ fontFamily:'Playfair Display', fontSize:36, marginBottom:10, color: bm.above ? '#3A9D8A' : '#9B9690' }}>
              {bm.above ? '+' : '-'}{bm.pct}%
            </div>
            <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.6 }}>
              You earn {bm.pct}% {bm.above ? 'more' : 'less'} than the market average for your role
            </div>
          </div>

          {/* Invite */}
          <div style={{ textAlign:'center', marginBottom:36 }}>
            <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.7, marginBottom:14 }}>
              Know someone in {form.title} in {form.city}? Send them this link.
            </div>
            <CopyBtn/>
          </div>

        </>)}

        {/* Calculate CTA */}
        {onGoCalculate && (
          <div style={{ textAlign:'center', borderTop:'1px solid #E8E4DE', paddingTop:28, marginBottom:28 }}>
            <div style={{ fontSize:14, color:'#6B6660', marginBottom:14 }}>
              {form.salaryType === 'net' ? 'Want to know your gross salary?' : 'Want to know your exact take-home pay?'}
            </div>
            <Pill variant="ghost" onClick={() => {
              const val = parseInt(form.base);
              onGoCalculate(form.salaryType === 'net' ? 'net-to-gross' : 'gross-to-net', val);
            }}>
              {form.salaryType === 'net' ? 'Calculate my gross salary' : 'Calculate my net salary'}
            </Pill>
          </div>
        )}

        {/* Bottom actions */}
        <div style={{ display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap' }}>
          <Pill variant="filled" onClick={onBrowse} style={{ padding:'13px 28px', fontSize:15 }}>Browse Salaries →</Pill>
          <Pill variant="ghost" onClick={() => { setSubmitted(false); setStep(1); setBenchmark(null); }}>Submit another</Pill>
        </div>

      </div>
    );
  }

  return (
    <div style={{ maxWidth:600, margin:'0 auto', padding:'40px 24px 80px' }}>

      {showGate && (
        <div style={{ background:'#1A1916', color:'#F4F2EF', borderRadius:16, padding:'20px 24px', marginBottom:36, lineHeight:1.7 }}>
          <div style={{ fontWeight:500, marginBottom:6 }}>Browsing requires submitting first.</div>
          <div style={{ fontSize:14, color:'#C8C4BC' }}>
            One submission unlocks unlimited browsing. This keeps the data fed and protects the integrity of the database — only contributors see contributors&#39; data.
          </div>
        </div>
      )}

      {/* Progress indicator */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:32 }}>
        <span style={{ fontSize:12, fontWeight:500, letterSpacing:'0.06em', color:'#9B9690', textTransform:'uppercase', whiteSpace:'nowrap' }}>
          Step {step} of 3
        </span>
        <div style={{ flex:1, height:2, background:'#E8E4DE', borderRadius:1, overflow:'hidden' }}>
          <div style={{
            height:'100%', background:'#3A9D8A', borderRadius:1,
            width:`${Math.round(step / 3 * 100)}%`, transition:'width 0.3s ease',
          }}/>
        </div>
      </div>

      {/* Heading */}
      <div style={{ marginBottom:28 }}>
        <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>Share your salary</div>
        <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.6 }}>{stepSubtitle}</div>
      </div>

      {/* ── Step 1: Role ── */}
      {step === 1 && (
        <form onSubmit={e => { e.preventDefault(); handleNext(); }} noValidate
          style={{ display:'flex', flexDirection:'column', gap:22 }}>

          <div style={{ border:'1.5px solid #E0DBD4', borderRadius:12, padding:'14px 16px', fontSize:13, color:'#8A8580', lineHeight:1.65 }}>
            <span style={{ fontWeight:500, color:'#6B6660' }}>Honest data only.</span>{' '}
            Submit your current salary or a real offer you received. No estimates, no rumors, no friend-of-a-friend numbers.
          </div>

          <div>
            <label style={L}>JOB TITLE</label>
            <input value={form.title} onChange={e=>set('title',e.target.value)}
              placeholder="e.g. Senior Product Manager" style={inp(errors.title)}/>
            {errors.title && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>

          <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <div>
              <label style={L}>INDUSTRY</label>
              <Sel field="industry" options={Object.keys(INDUSTRY_SUBS)} placeholder="Select industry"/>
              {errors.industry && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
            </div>
            <div>
              <label style={L}>SUB-CATEGORY</label>
              <Sel field="industrySub" options={subs}
                placeholder={form.industry ? 'Select sub-category' : 'Select industry first'}
                disabled={!form.industry}/>
            </div>
          </div>

          <Pill type="submit" variant="filled" style={{ alignSelf:'flex-start', padding:'13px 32px', fontSize:15 }}>
            Continue →
          </Pill>
        </form>
      )}

      {/* ── Step 2: Experience ── */}
      {step === 2 && (
        <form onSubmit={e => { e.preventDefault(); handleNext(); }} noValidate
          style={{ display:'flex', flexDirection:'column', gap:22 }}>

          <div>
            <label style={L}>YEARS OF EXPERIENCE</label>
            <Sel field="experience" options={EXP_RANGES} placeholder="Select range"/>
            {errors.experience && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>

          <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
            <Pill type="submit" variant="filled" style={{ padding:'13px 32px', fontSize:15 }}>
              Continue →
            </Pill>
            <BackBtn/>
          </div>
        </form>
      )}

      {/* ── Step 3: Company & salary ── */}
      {step === 3 && (
        <form onSubmit={handleSubmit} noValidate style={{ display:'flex', flexDirection:'column', gap:22 }}>

          {/* Context chip — role + experience from previous steps */}
          <div style={{ background:'#F7F5F2', borderRadius:12, padding:'12px 16px', fontSize:13, color:'#6B6660', display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
            <span style={{ fontWeight:500 }}>{form.title}</span>
            <span style={{ color:'#D5D0C8' }}>·</span>
            <span>{form.industry}{form.industrySub ? ` / ${form.industrySub}` : ''}</span>
            <span style={{ color:'#D5D0C8' }}>·</span>
            <span>{form.experience}</span>
          </div>

          <div className="two-col" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <div>
              <label style={L}>COMPANY TYPE</label>
              <Sel field="companyType" options={["Multinational","Local","Startup"]} placeholder="Select type"/>
              {errors.companyType && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
            </div>
            <div>
              <label style={L}>COMPANY SIZE</label>
              <Sel field="companySize" options={COMPANY_SIZES} placeholder="No. of employees"/>
              {errors.companySize && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
            </div>
          </div>

          <div>
            <label style={L}>CITY</label>
            <Sel field="city" options={CITIES_FORM} placeholder="Select city"/>
            {errors.city && <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>}
          </div>

          {/* Base salary */}
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
              <label style={{...L, marginBottom:0}}>MONTHLY BASE SALARY</label>
              <div style={{ display:'flex', background:'#ECEAE5', borderRadius:999, padding:3, gap:2 }}>
                {['net','gross'].map(t => (
                  <button key={t} type="button" onClick={() => {
                    if (t === form.salaryType) return;
                    const v = parseFloat(form.base);
                    if (v > 0) {
                      const converted = t === 'gross'
                        ? Math.round(calcGrossFromNet(v).gross)
                        : Math.round(calcTakeHome(v).net);
                      setForm(f => ({ ...f, salaryType: t, base: String(converted) }));
                      setErrors(er => ({ ...er, salaryType: false, base: false }));
                      setApiError('');
                    } else {
                      set('salaryType', t);
                    }
                  }} style={{
                    padding:'4px 12px', borderRadius:999, border:'none', cursor:'pointer',
                    fontFamily:'DM Sans', fontSize:12, fontWeight:500, textTransform:'capitalize',
                    background: form.salaryType === t ? '#fff' : 'transparent',
                    color: form.salaryType === t ? '#1A1916' : '#9B9690',
                    boxShadow: form.salaryType === t ? '0 1px 3px rgba(0,0,0,0.10)' : 'none',
                    transition:'all 0.15s',
                  }}>{t}</button>
                ))}
              </div>
            </div>
            <div style={{ fontSize:12, color:'#B0ABA4', marginBottom:10 }}>
              Offers are usually gross. Your take-home is net.
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10, alignItems:'center' }}>
              <input type="number" value={form.base} onChange={e=>set('base',e.target.value)}
                placeholder="e.g. 25000" style={inp(errors.base)}/>
              <div style={{ position:'relative', minWidth:120 }}>
                <select value={form.currency} onChange={e=>set('currency',e.target.value)} style={{
                  ...inp(false), minWidth:120, cursor:'pointer', appearance:'none', WebkitAppearance:'none',
                }}>
                  <option>EGP</option>
                  <option>USD-pegged</option>
                </select>
                <Chevron/>
              </div>
            </div>
            {errors.base && (
              <div style={{ fontSize:12, color:'#E8826A', marginTop:5 }}>Required</div>
            )}
          </div>

          <div>
            <label style={L}>COMPENSATION TYPE</label>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {['Base salary only', 'Base + commission', 'Base + bonus'].map(opt => (
                <button key={opt} type="button" onClick={() => set('compensationType', opt)} style={{
                  padding:'9px 16px', borderRadius:999, border:'1.5px solid',
                  borderColor: form.compensationType === opt ? '#3A9D8A' : '#E0DBD4',
                  background: form.compensationType === opt ? '#DFF0ED' : '#fff',
                  color: form.compensationType === opt ? '#2A7A6B' : '#6B6660',
                  fontFamily:'DM Sans', fontSize:13, fontWeight:500, cursor:'pointer',
                  transition:'all 0.15s',
                }}>{opt}</button>
              ))}
            </div>
          </div>

          <div style={{ background:'#F7F5F2', borderRadius:12, padding:'14px 16px', fontSize:13, color:'#8A8580', lineHeight:1.6 }}>
            Your submission is fully anonymous. We don&#39;t collect your name, email, or IP address. Nothing links this entry back to you.
          </div>

          <p style={{ fontSize:13, color:'#9B9690', lineHeight:1.6 }}>
            Only submit your current net salary or a real offer you received. No estimates, no guesses.
          </p>

          {apiError && (
            <div style={{ fontSize:13, color:'#E8826A', padding:'12px 16px', background:'#FEF4F1', borderRadius:10 }}>
              {apiError}
            </div>
          )}

          <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
            <Pill type="submit" variant="filled"
              style={{ padding:'13px 32px', fontSize:15, opacity: submitting ? 0.7 : 1 }}>
              {submitting ? 'Submitting…' : 'Add my salary'}
            </Pill>
            <BackBtn/>
          </div>
        </form>
      )}
    </div>
  );
};

// ─── Calculator View ──────────────────────────────────────────────────────────
const CalculatorView = ({ onGoSubmit, onGoBrowse, initialMode = 'gross-to-net', initialInput = '' }) => {
  const [mode,        setMode]        = useState(initialMode);
  const [input,       setInput]       = useState(initialInput);
  const [result,      setResult]      = useState(null);
  const [previewRows, setPreviewRows] = useState(null);

  const isNtG      = mode === 'net-to-gross';
  const submitted  = localStorage.getItem('cu_has_submitted') === 'true';

  useEffect(() => {
    if (!initialInput) return;
    const v = parseFloat(initialInput);
    if (v > 0) setResult(initialMode === 'net-to-gross' ? calcGrossFromNet(v) : calcTakeHome(v));
  }, []);

  const handleCalc = (ev) => {
    ev.preventDefault();
    const v = parseFloat(input);
    if (!v || v <= 0) return;
    setResult(isNtG ? calcGrossFromNet(v) : calcTakeHome(v));
  };

  const switchMode = (m) => { setMode(m); setInput(''); setResult(null); setPreviewRows(null); };

  useEffect(() => {
    if (!result) return;
    if (!db) { setPreviewRows([]); return; }
    db.from('submissions')
      .select('job_title, city, industry, company_type, salary_min, salary_max')
      .or('is_visible.eq.true,is_seeded.eq.true')
      .limit(3)
      .then(({ data }) => setPreviewRows(data || []));
  }, [result]);

  const cards = previewRows !== null
    ? [...previewRows, ...CALC_PREVIEW_PLACEHOLDERS].slice(0, 3)
    : null;

  const DeductionRow = ({ label, value }) => (
    <div style={{ display:'flex', justifyContent:'space-between', padding:'9px 0', borderBottom:'1px solid #F2EFE9', fontSize:14, color:'#6B6660' }}>
      <span>{label}</span>
      <span style={{ fontVariantNumeric:'tabular-nums' }}>− {fmt(value)} EGP</span>
    </div>
  );

  const BlurredSalaryCard = ({ entry: e }) => (
    <div style={{
      background:'#fff', borderRadius:20, padding:'22px 24px',
      border:'1.5px solid #E8E4DE', boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      display:'flex', flexDirection:'column', gap:14,
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
        <div style={{ fontFamily:'Playfair Display', fontSize:17, fontWeight:500, lineHeight:1.3 }}>{e.job_title}</div>
        <Tag>{e.city}</Tag>
      </div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        <Tag>{e.industry}</Tag>
        <Tag>{e.company_type}</Tag>
      </div>
      <div style={{ borderTop:'1px solid #EEEAE4', paddingTop:14 }}>
        <div style={{ fontSize:10, fontWeight:500, letterSpacing:'0.12em', color:'#9B9690', marginBottom:4 }}>MONTHLY · EGP</div>
        <div style={{
          fontFamily:'Playfair Display', fontSize:22, fontWeight:500, color:'#3A9D8A', letterSpacing:'-0.02em',
          filter:'blur(6px)', userSelect:'none', pointerEvents:'none',
        }}>
          {e.salary_min === e.salary_max
            ? e.salary_min.toLocaleString()
            : `${e.salary_min.toLocaleString()} – ${e.salary_max.toLocaleString()}`}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth:520, margin:'0 auto', padding:'40px 24px 80px' }}>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontFamily:'Playfair Display', fontSize:24, marginBottom:8 }}>Take-home calculator</div>
        <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.6 }}>
          Egypt 2025/2026 · Official tax brackets · No account needed
        </div>
      </div>

      {/* Mode toggle */}
      <div style={{ display:'inline-flex', background:'#EEEAE4', borderRadius:999, padding:4, marginBottom:24 }}>
        {[['gross-to-net', 'Gross → Net'], ['net-to-gross', 'Net → Gross']].map(([key, label]) => (
          <button key={key} type="button" onClick={() => switchMode(key)} style={{
            padding:'8px 18px', borderRadius:999, fontSize:13, fontWeight:500,
            border:'none', cursor:'pointer', transition:'all 0.18s ease', fontFamily:'DM Sans',
            background: mode === key ? '#fff' : 'transparent',
            color:      mode === key ? '#1A1916' : '#6B6660',
            boxShadow:  mode === key ? '0 1px 3px rgba(0,0,0,0.10)' : 'none',
          }}>{label}</button>
        ))}
      </div>

      {isNtG && (
        <div style={{ fontSize:13, color:'#6B6660', lineHeight:1.6, marginBottom:20, background:'#F7F5F2', borderRadius:12, padding:'12px 16px' }}>
          Know what gross to negotiate for — enter your target take-home and see the gross you need to ask for.
        </div>
      )}

      <form onSubmit={handleCalc}>
        <label style={{ fontSize:12, fontWeight:500, letterSpacing:'0.06em', color:'#9B9690', display:'block', marginBottom:6 }}>
          {isNtG ? 'TARGET MONTHLY NET (EGP)' : 'MONTHLY GROSS SALARY (EGP)'}
        </label>
        <div style={{ display:'flex', gap:10, marginBottom: result ? 32 : 0 }}>
          <input
            type="number" value={input}
            onChange={e => { setInput(e.target.value); setResult(null); setPreviewRows(null); }}
            placeholder={isNtG ? 'e.g. 25,000' : 'e.g. 30,000'}
            style={{
              flex:1, padding:'13px 16px', borderRadius:12, fontFamily:'DM Sans', fontSize:14,
              border:'1.5px solid #E0DBD4', background:'#fff', color:'#1A1916', outline:'none',
            }}
          />
          <Pill type="submit" variant="filled" style={{ padding:'13px 24px', flexShrink:0 }}>
            Calculate
          </Pill>
        </div>
      </form>

      {result && (
        <>
          {/* Breakdown card */}
          <div style={{ background:'#fff', borderRadius:20, padding:'24px', border:'1.5px solid #E8E4DE', marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingBottom:14, marginBottom:4, borderBottom:'1.5px solid #EEEAE4' }}>
              <span style={{ fontSize:14, fontWeight:500 }}>{isNtG ? 'Required gross' : 'Gross salary'}</span>
              <span style={{ fontFamily:'Playfair Display', fontSize:isNtG ? 28 : 20, fontWeight:500, letterSpacing:'-0.02em', color: isNtG ? '#3A9D8A' : 'inherit' }}>
                {fmt(result.gross)} EGP
              </span>
            </div>
            <DeductionRow label="Social insurance (11%, cap 14,500 EGP)" value={result.si}/>
            <DeductionRow label="Health insurance (1%)"                   value={result.hi}/>
            <DeductionRow label="Income tax"                               value={result.incomeTax}/>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', paddingTop:16, marginTop:2 }}>
              <span style={{ fontSize:16, fontWeight:500 }}>Net take-home</span>
              <span style={{ fontFamily:'Playfair Display', fontSize: isNtG ? 20 : 28, fontWeight:500, color: isNtG ? '#1A1916' : '#3A9D8A', letterSpacing:'-0.02em' }}>
                {fmt(result.net)} EGP
              </span>
            </div>
          </div>

          <div style={{ fontSize:12, color:'#B0ABA4', lineHeight:1.55, marginBottom:28 }}>
            Estimate only. Actual deductions depend on your specific situation and employer and may vary.
          </div>

          {/* CTA */}
          <div style={{ background:'#F7F5F2', borderRadius:16, padding:'20px 24px', marginBottom:20 }}>
            <div style={{ fontSize:15, fontWeight:500, marginBottom:6, color:'#1A1916' }}>
              See where {fmt(result.gross)} EGP stands in your field.
            </div>
            <div style={{ fontSize:14, color:'#6B6660', lineHeight:1.65, marginBottom:16 }}>
              Submit once, unlock the full picture.
            </div>
            <Pill variant="filled" onClick={onGoSubmit} style={{ padding:'11px 24px' }}>
              Share your salary →
            </Pill>
          </div>

          {/* Blurred preview or browse link */}
          {submitted ? (
            <Pill variant="ghost" onClick={onGoBrowse} style={{ padding:'11px 24px' }}>
              Browse salaries →
            </Pill>
          ) : cards && (
            <>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {cards.map((c, i) => <BlurredSalaryCard key={i} entry={c}/>)}
              </div>
              <div style={{ fontSize:13, color:'#9B9690', textAlign:'center', marginTop:14 }}>
                Submit your salary to unlock these.
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
};

// ─── Utility Shell ────────────────────────────────────────────────────────────
const UtilityShell = ({ onGoHome, initialTab, initialGate }) => {
  const [activeTab,   setActiveTab]   = useState(initialTab || 'submit');
  const [gated,       setGated]       = useState(initialGate || false);
  const [calcPrefill, setCalcPrefill] = useState(null);
  const [detailTitle, setDetailTitle] = useState(null);

  const hasSubmitted = () => localStorage.getItem('cu_has_submitted') === 'true';

  const switchTab = (key) => {
    setDetailTitle(null);
    if (key === 'calculate') {
      setCalcPrefill(null); setActiveTab('calculate'); setGated(false); return;
    }
    if (key === 'browse' && !hasSubmitted()) {
      setActiveTab('submit'); setGated(true);
    } else {
      setActiveTab(key); setGated(false);
    }
  };

  const onBrowseUnlocked        = () => { setDetailTitle(null); setActiveTab('browse'); setGated(false); window.scrollTo(0,0); };
  const onGoSubmit               = () => { setDetailTitle(null); setActiveTab('submit'); setGated(false); window.scrollTo(0,0); };
  const onGoCalculateWithPrefill = (mode, value) => {
    setCalcPrefill({ mode, value: String(value) });
    setActiveTab('calculate'); setGated(false); window.scrollTo(0,0);
  };
  const onTitleClick = (titleData) => { setDetailTitle(titleData); window.scrollTo(0,0); };

  const TABS = [
    ['browse',    'Browse salaries',               'Browse'],
    ['submit',    'Share anonymously', 'Share'],
    ['calculate', 'Calculate',                     'Calculate'],
  ];

  return (
    <div style={{ minHeight:'100vh', background:'#F4F2EF' }}>
      <nav className="shell-nav" style={{
        position:'sticky', top:0, zIndex:100,
        background:'rgba(244,242,239,0.92)', backdropFilter:'blur(12px)',
        borderBottom:'1px solid #E8E4DE',
        padding:'0 32px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        height:64,
      }}>
        <Logo onClick={onGoHome}/>
        <div style={{ display:'flex', alignItems:'center', gap:2, background:'#ECEAE5', borderRadius:999, padding:4 }}>
          {TABS.map(([key, label, short]) => (
            <button key={key} className="shell-tab" onClick={() => switchTab(key)} style={{
              padding:'8px 18px', borderRadius:999, border:'none', cursor:'pointer',
              fontFamily:'DM Sans', fontSize:13, fontWeight:500, transition:'all 0.18s ease',
              background: activeTab === key ? '#fff' : 'transparent',
              color: activeTab === key ? '#1A1916' : '#8A8580',
              boxShadow: activeTab === key ? '0 1px 4px rgba(0,0,0,0.10)' : 'none',
            }}>
              <span className="tab-full">{label}</span>
              <span className="tab-short">{short}</span>
            </button>
          ))}
        </div>
        <div className="shell-nav-spacer" style={{ width:120 }}/>
      </nav>

      {activeTab === 'browse' && !detailTitle && <BrowseView onTitleClick={onTitleClick}/>}
      {activeTab === 'browse' &&  detailTitle && <TitleDetailView titleData={detailTitle} onBack={() => { setDetailTitle(null); window.scrollTo(0,0); }} onGoSubmit={onGoSubmit}/>}
      {activeTab === 'submit'    && <SubmitView showGate={gated} onBrowse={onBrowseUnlocked} onGoCalculate={onGoCalculateWithPrefill}/>}
      {activeTab === 'calculate' && <CalculatorView onGoSubmit={onGoSubmit} onGoBrowse={onBrowseUnlocked} initialMode={calcPrefill ? calcPrefill.mode : 'gross-to-net'} initialInput={calcPrefill ? calcPrefill.value : ''}/>}
    </div>
  );
};

      <div style={{ borderTop:'1px solid #EEEAE4', paddingTop:12 }}>
        <div style={{ fontSize:10, fontWeight:500, letterSpacing:'0.12em', color:'#9B9690', marginBottom:3, display:'flex', alignItems:'center', gap:5 }}>
          MONTHLY · EGP
          <svg style={{ opacity: on ? 0 : 1, transition:'opacity 0.3s ease', flexShrink:0 }}
            width="10" height="11" viewBox="0 0 10 12" fill="none">
            <rect x="0.75" y="5" width="8.5" height="6.25" rx="1.5" stroke="#B0ABA4" strokeWidth="1.5"/>
            <path d="M3 5V3.5a2 2 0 0 1 4 0V5" stroke="#B0ABA4" strokeWidth="1.5" strokeLinecap="round"/>

          filter: on ? 'none' : 'blur(6px)',
          userSelect: on ? 'text' : 'none',
          transition:'filter 0.3s ease',
        }}>
          {e.min} – {e.max}
        </div>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const returning  = localStorage.getItem('cu_has_submitted') === 'true';
  const [view,     setView]     = useState(returning ? 'utility' : 'landing');
  const [tab,      setTab]      = useState(returning ? 'browse'  : 'submit');
  const [showGate, setShowGate] = useState(false);

  const goToUtility = (t) => {
    if (t === 'calculate') {
      setTab('calculate'); setShowGate(false); setView('utility');
      window.scrollTo(0, 0); return;
    }
    const sub = localStorage.getItem('cu_has_submitted') === 'true';
    const dest = (t === 'browse' && !sub) ? 'submit' : t;
    setTab(dest);
    setShowGate(t === 'browse' && !sub);
    setView('utility');
    window.scrollTo(0, 0);
  };

  const goHome = () => { setView('landing'); window.scrollTo(0, 0); };

  if (view === 'landing') return <LandingPage onEnter={goToUtility}/>;
  return <UtilityShell onGoHome={goHome} initialTab={tab} initialGate={showGate}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
